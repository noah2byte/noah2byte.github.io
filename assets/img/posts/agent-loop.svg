<svg viewBox="0 0 880 430" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="880" height="430" fill="#ffffff"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#0f172a">그림 3. 에이전트 루프 — Hermes의 한 턴이 실제로 하는 일</text>
  <text x="24" y="54" font-size="12" fill="#64748b">이 루프를 최대 150회 반복한다. 매 바퀴가 모델의 추론 품질에 걸려 있으므로, 성능 하한은 프레임워크가 아니라 모델이 결정한다</text>

  <!-- 1 context assembly -->
  <rect x="24" y="90" width="220" height="150" rx="10" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="134" y="115" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">① 컨텍스트 조립</text>
  <g font-size="11.5" fill="#334155">
    <text x="42" y="140">· 시스템 프롬프트 (SOUL.md)</text>
    <text x="42" y="160">· 툴 스키마 약 30종</text>
    <text x="42" y="180">· 관련 스킬 + 메모리</text>
    <text x="42" y="200">· AGENTS.md (작업 디렉터리)</text>
    <text x="42" y="220">· 대화 이력</text>
  </g>

  <line x1="244" y1="165" x2="290" y2="165" stroke="#475569" stroke-width="1.6" marker-end="url(#arr3)"/>

  <!-- 2 llm -->
  <rect x="294" y="120" width="170" height="90" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="379" y="152" font-size="13" font-weight="700" fill="#3730a3" text-anchor="middle">② LLM 추론</text>
  <text x="379" y="174" font-size="11.5" fill="#334155" text-anchor="middle">다음 행동 결정:</text>
  <text x="379" y="192" font-size="11.5" fill="#334155" text-anchor="middle">답할까, 툴을 부를까</text>

  <line x1="464" y1="165" x2="510" y2="165" stroke="#475569" stroke-width="1.6" marker-end="url(#arr3)"/>

  <!-- decision -->
  <polygon points="590,120 668,165 590,210 512,165" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="590" y="160" font-size="12.5" font-weight="700" fill="#92400e" text-anchor="middle">툴 호출이</text>
  <text x="590" y="178" font-size="12.5" font-weight="700" fill="#92400e" text-anchor="middle">필요한가?</text>

  <!-- no -> answer -->
  <line x1="668" y1="165" x2="724" y2="165" stroke="#475569" stroke-width="1.6" marker-end="url(#arr3)"/>
  <text x="694" y="155" font-size="11.5" fill="#64748b" text-anchor="middle">아니오</text>
  <rect x="728" y="135" width="128" height="60" rx="10" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/>
  <text x="792" y="161" font-size="13" font-weight="700" fill="#115e59" text-anchor="middle">최종 응답</text>
  <text x="792" y="181" font-size="11" fill="#334155" text-anchor="middle">턴 종료</text>

  <!-- yes -> execute -->
  <line x1="590" y1="210" x2="590" y2="262" stroke="#475569" stroke-width="1.6" marker-end="url(#arr3)"/>
  <text x="604" y="240" font-size="11.5" fill="#64748b">예</text>
  <rect x="500" y="266" width="180" height="58" rx="10" fill="#f0fdfa" stroke="#0d9488"/>
  <text x="590" y="290" font-size="12.5" font-weight="700" fill="#115e59" text-anchor="middle">③ 툴 실행</text>
  <text x="590" y="310" font-size="11" fill="#334155" text-anchor="middle">프레임워크가 실행 (모델 아님)</text>

  <line x1="500" y1="295" x2="454" y2="295" stroke="#475569" stroke-width="1.6" marker-end="url(#arr3)"/>
  <rect x="274" y="266" width="180" height="58" rx="10" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="364" y="290" font-size="12.5" font-weight="700" fill="#0f172a" text-anchor="middle">④ 결과 주입</text>
  <text x="364" y="310" font-size="11" fill="#334155" text-anchor="middle">tool 메시지로 이력에 추가</text>

  <!-- loop back -->
  <path d="M 274 295 L 200 295 L 200 165 L 240 165" fill="none" stroke="#6366f1" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arr3)"/>
  <text x="208" y="255" font-size="11.5" font-weight="700" fill="#3730a3">다시 ②로</text>
  <text x="208" y="271" font-size="10.5" fill="#64748b">(최대 150회)</text>

  <!-- bottom note -->
  <rect x="24" y="352" width="832" height="56" rx="8" fill="#fef2f2" stroke="#dc2626"/>
  <text x="40" y="375" font-size="12.5" font-weight="700" fill="#991b1b">소형 모델이 무너지는 이유</text>
  <text x="40" y="395" font-size="12" fill="#7f1c1c">①에서 조립된 컨텍스트만 1만 토큰 이상 — 이를 소화하며 ②의 판단을 150회 유지하는 것은 프론티어급 추론을 전제로 한 설계다.</text>
</svg>
