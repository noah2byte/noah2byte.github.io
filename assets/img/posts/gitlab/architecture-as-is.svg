<svg viewBox="0 0 960 620" width="960" height="620" style="max-width:100%;height:auto" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>

  <text x="480" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">AS-IS : GitLab Omnibus 16.6.1 (단일 인스턴스)</text>
  <text x="480" y="56" text-anchor="middle" font-size="13" fill="#64748b">lms-comm-1 (XEN 하이퍼바이저 · k8s 구버전) — 하나의 파드에 전 컴포넌트 동거</text>

  <!-- Cluster -->
  <rect x="40" y="80" width="560" height="470" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="60" y="106" font-size="14" font-weight="600" fill="#334155">☸ lms-comm-1 클러스터</text>

  <!-- GitLab Pod -->
  <rect x="65" y="125" width="330" height="400" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="80" y="150" font-size="14" font-weight="700" fill="#c2410c">🦊 GitLab Omnibus 파드 (단일 인스턴스)</text>
  <text x="80" y="168" font-size="11" fill="#9a3412">모든 서비스가 "프로세스"로 한 파드 안에 동거</text>

  <!-- process boxes -->
  <g font-size="11.5" fill="#431407">
    <rect x="85" y="182" width="140" height="26" rx="5" fill="#ffedd5" stroke="#fdba74"/><text x="155" y="199" text-anchor="middle">puma (web)</text>
    <rect x="240" y="182" width="140" height="26" rx="5" fill="#ffedd5" stroke="#fdba74"/><text x="310" y="199" text-anchor="middle">sidekiq</text>
    <rect x="85" y="214" width="140" height="26" rx="5" fill="#ffedd5" stroke="#fdba74"/><text x="155" y="231" text-anchor="middle">gitaly</text>
    <rect x="240" y="214" width="140" height="26" rx="5" fill="#ffedd5" stroke="#fdba74"/><text x="310" y="231" text-anchor="middle">gitlab-workhorse</text>
    <rect x="85" y="246" width="140" height="26" rx="5" fill="#fee2e2" stroke="#f87171"/><text x="155" y="263" text-anchor="middle" font-weight="700">postgresql ⚠</text>
    <rect x="240" y="246" width="140" height="26" rx="5" fill="#ffedd5" stroke="#fdba74"/><text x="310" y="263" text-anchor="middle">redis</text>
    <rect x="85" y="278" width="140" height="26" rx="5" fill="#fee2e2" stroke="#f87171"/><text x="155" y="295" text-anchor="middle" font-weight="700">prometheus ⚠</text>
    <rect x="240" y="278" width="140" height="26" rx="5" fill="#ffedd5" stroke="#fdba74"/><text x="310" y="295" text-anchor="middle">alertmanager</text>
    <rect x="85" y="310" width="140" height="26" rx="5" fill="#ffedd5" stroke="#fdba74"/><text x="155" y="327" text-anchor="middle">sshd</text>
    <rect x="240" y="310" width="140" height="26" rx="5" fill="#ffedd5" stroke="#fdba74"/><text x="310" y="327" text-anchor="middle">gitlab-kas</text>
    <rect x="85" y="342" width="140" height="26" rx="5" fill="#ffedd5" stroke="#fdba74"/><text x="155" y="359" text-anchor="middle">exporters ×3</text>
    <rect x="240" y="342" width="140" height="26" rx="5" fill="#ffedd5" stroke="#fdba74"/><text x="310" y="359" text-anchor="middle">logrotate</text>
  </g>

  <!-- failure note inside pod -->
  <rect x="85" y="382" width="295" height="128" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-dasharray="5 3"/>
  <text x="98" y="404" font-size="12" font-weight="700" fill="#b91c1c">🔥 장애 패턴 (월 2~3회)</text>
  <text x="98" y="424" font-size="11" fill="#7f1d1d">· /dev/shm 메트릭 캐시 증가 → Disk Full</text>
  <text x="98" y="442" font-size="11" fill="#7f1d1d">· 백업 tar가 /var/opt/gitlab/backups에 적재</text>
  <text x="98" y="460" font-size="11" fill="#7f1d1d">   → 같은 볼륨의 PostgreSQL 적재 에러 유발</text>
  <text x="98" y="478" font-size="11" fill="#7f1d1d">· 프로세스 하나만 죽어도 GitLab 전체 500</text>
  <text x="98" y="496" font-size="11" fill="#7f1d1d">· 리소스가 프로젝트 규모 대비 부족</text>

  <!-- PVC -->
  <rect x="430" y="180" width="150" height="150" rx="10" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="505" y="205" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1d4ed8">chunjae-gitlab-pvc</text>
  <text x="505" y="228" text-anchor="middle" font-size="11" fill="#1e40af">/etc/gitlab</text>
  <text x="505" y="246" text-anchor="middle" font-size="11" fill="#1e40af">/var/opt/gitlab</text>
  <text x="505" y="264" text-anchor="middle" font-size="11" fill="#1e40af">/var/log/gitlab</text>
  <text x="505" y="292" text-anchor="middle" font-size="11.5" font-weight="700" fill="#dc2626">블록 스토리지</text>
  <text x="505" y="310" text-anchor="middle" font-size="11.5" font-weight="700" fill="#dc2626">Reclaim: Delete ⚠</text>

  <path d="M395 255 L430 255" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Backup -->
  <rect x="660" y="150" width="250" height="120" rx="10" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="785" y="176" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">bak-vms-01 (백업 서버)</text>
  <text x="785" y="198" text-anchor="middle" font-size="11.5" fill="#475569">매일 02:00 gitlab-backup create</text>
  <text x="785" y="218" text-anchor="middle" font-size="11.5" fill="#475569">tar 생성 → sto-bak-01 버킷 전송</text>
  <text x="785" y="246" text-anchor="middle" font-size="11" fill="#b91c1c" font-weight="600">단, tar가 파드 내부에도 계속 누적됨</text>

  <path d="M580 235 C 630 220, 640 210, 660 205" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Object storage -->
  <rect x="660" y="310" width="250" height="70" rx="10" fill="#ecfdf5" stroke="#34d399"/>
  <text x="785" y="338" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">sto-bak-01 (Object Storage)</text>
  <text x="785" y="360" text-anchor="middle" font-size="11.5" fill="#065f46">백업 tar + gitlab-secrets.json + gitlab.rb</text>
  <path d="M785 270 L785 310" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Bottom risk chain -->
  <rect x="640" y="420" width="290" height="130" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="655" y="446" font-size="12.5" font-weight="700" fill="#b91c1c">단일 장애점(SPOF) 구조</text>
  <text x="655" y="470" font-size="11.5" fill="#7f1d1d">디스크 풀 → PostgreSQL 적재 실패</text>
  <text x="655" y="490" font-size="11.5" fill="#7f1d1d">→ GitLab 전체 500 Error → 서비스 중단</text>
  <text x="655" y="510" font-size="11.5" fill="#7f1d1d">→ 매번 수동 임시조치(캐시 삭제) 반복</text>
  <text x="655" y="534" font-size="11.5" font-weight="700" fill="#b91c1c">→ 개발팀의 플랫폼 신뢰 하락</text>
  <path d="M600 470 L640 470" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)"/>

  <text x="480" y="595" text-anchor="middle" font-size="12" fill="#94a3b8">XEN → KVM 하이퍼바이저 전환(클러스터 재생성 필수) + k8s 버전 업그레이드 필요가 마이그레이션의 직접 계기</text>
</svg>
