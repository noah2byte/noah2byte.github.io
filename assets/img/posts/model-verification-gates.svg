<svg viewBox="0 0 880 360" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <marker id="arr5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="880" height="360" fill="#ffffff"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#0f172a">그림 5. 로컬 모델을 에이전트에 붙이기 전 3단계 검증 — 실제 탈락 지점</text>
  <text x="24" y="54" font-size="12" fill="#64748b">①만 믿고 세팅하면 ②에서 무너지는 모델에 시간을 낭비한다 (이번 PoC의 교훈, 본문 4.1절)</text>

  <!-- gate 1 -->
  <rect x="24" y="84" width="248" height="130" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="148" y="112" font-size="13.5" font-weight="700" fill="#0f172a" text-anchor="middle">① capability 확인</text>
  <text x="148" y="134" font-size="11.5" fill="#334155" text-anchor="middle" font-family="Consolas,monospace">ollama show &lt;모델&gt;</text>
  <text x="148" y="154" font-size="11.5" fill="#334155" text-anchor="middle">capabilities에 tools가 있는가?</text>
  <text x="148" y="178" font-size="11" fill="#64748b" text-anchor="middle">검증 대상: 모델 메타데이터</text>
  <text x="148" y="196" font-size="11" fill="#64748b" text-anchor="middle">실패 시: HTTP 400으로 즉사</text>

  <line x1="272" y1="149" x2="316" y2="149" stroke="#475569" stroke-width="1.8" marker-end="url(#arr5)"/>
  <text x="294" y="139" font-size="10.5" fill="#0d9488" text-anchor="middle" font-weight="700">통과</text>

  <!-- gate 2 -->
  <rect x="320" y="84" width="248" height="130" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="444" y="112" font-size="13.5" font-weight="700" fill="#0f172a" text-anchor="middle">② 격리 테스트</text>
  <text x="444" y="134" font-size="11.5" fill="#334155" text-anchor="middle">Ollama API에 tool 결과가 든</text>
  <text x="444" y="152" font-size="11.5" fill="#334155" text-anchor="middle">대화를 직접 던져 소화하는지 확인</text>
  <text x="444" y="178" font-size="11" fill="#64748b" text-anchor="middle">검증 대상: 채팅 템플릿의 tool role</text>
  <text x="444" y="196" font-size="11" fill="#64748b" text-anchor="middle">프레임워크를 배제한 최소 조건</text>

  <line x1="568" y1="149" x2="612" y2="149" stroke="#475569" stroke-width="1.8" marker-end="url(#arr5)"/>
  <text x="590" y="139" font-size="10.5" fill="#0d9488" text-anchor="middle" font-weight="700">통과</text>

  <!-- gate 3 -->
  <rect x="616" y="84" width="240" height="130" rx="10" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.6"/>
  <text x="736" y="112" font-size="13.5" font-weight="700" fill="#115e59" text-anchor="middle">③ 프레임워크 연결</text>
  <text x="736" y="134" font-size="11.5" fill="#334155" text-anchor="middle">Hermes에 붙여 멀티턴 루프 검증</text>
  <text x="736" y="152" font-size="11.5" fill="#334155" text-anchor="middle">(0~4단계 시나리오)</text>
  <text x="736" y="178" font-size="11" fill="#64748b" text-anchor="middle">검증 대상: 에이전틱 역량</text>
  <text x="736" y="196" font-size="11" fill="#64748b" text-anchor="middle">여기서부터가 진짜 평가</text>

  <!-- casualties -->
  <line x1="148" y1="214" x2="148" y2="252" stroke="#dc2626" stroke-width="1.6" marker-end="url(#arr5)"/>
  <rect x="40" y="256" width="216" height="66" rx="9" fill="#fef2f2" stroke="#dc2626"/>
  <text x="148" y="280" font-size="12.5" font-weight="700" fill="#991b1b" text-anchor="middle">✗ gemma3:latest 탈락</text>
  <text x="148" y="300" font-size="11" fill="#7f1c1c" text-anchor="middle">"does not support tools"</text>
  <text x="148" y="315" font-size="11" fill="#7f1c1c" text-anchor="middle">HTTP 400, 대화 시작 불가</text>

  <line x1="444" y1="214" x2="444" y2="252" stroke="#dc2626" stroke-width="1.6" marker-end="url(#arr5)"/>
  <rect x="336" y="256" width="216" height="66" rx="9" fill="#fef2f2" stroke="#dc2626"/>
  <text x="444" y="280" font-size="12.5" font-weight="700" fill="#991b1b" text-anchor="middle">✗ gemma4:e2b 탈락</text>
  <text x="444" y="300" font-size="11" fill="#7f1c1c" text-anchor="middle">"31C, sunny"를 쥐여줘도</text>
  <text x="444" y="315" font-size="11" fill="#7f1c1c" text-anchor="middle">인지 못함 — 결과 소화 실패</text>

  <line x1="736" y1="214" x2="736" y2="252" stroke="#0d9488" stroke-width="1.6" marker-end="url(#arr5)"/>
  <rect x="632" y="256" width="208" height="66" rx="9" fill="#f0fdfa" stroke="#0d9488"/>
  <text x="736" y="280" font-size="12.5" font-weight="700" fill="#115e59" text-anchor="middle">다음 후보: qwen3:8b</text>
  <text x="736" y="300" font-size="11" fill="#334155" text-anchor="middle">템플릿에 tool role 렌더링 포함</text>
  <text x="736" y="315" font-size="11" fill="#334155" text-anchor="middle">→ ②부터 다시 통과시킬 것</text>
</svg>
