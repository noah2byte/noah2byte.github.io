<svg viewBox="0 0 880 600" width="880" height="600" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="880" height="600" fill="#ffffff"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#0f172a">그림 1. Hermes Agent 전체 아키텍처</text>
  <text x="24" y="54" font-size="12" fill="#64748b">모든 인터페이스가 하나의 에이전트 코어를 공유한다 — 어디서 대화해도 같은 기억, 같은 스킬</text>

  <!-- 사용자 접점 layer -->
  <rect x="24" y="76" width="832" height="88" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="40" y="100" font-size="12" font-weight="700" fill="#64748b">사용자 접점 (어디서 대화하는가)</text>
  <g font-size="12.5" fill="#0f172a" text-anchor="middle">
    <rect x="44"  y="112" width="140" height="38" rx="7" fill="#ffffff" stroke="#94a3b8"/>
    <text x="114" y="136">CLI / TUI</text>
    <rect x="204" y="112" width="140" height="38" rx="7" fill="#ffffff" stroke="#94a3b8"/>
    <text x="274" y="136">데스크톱 앱</text>
    <rect x="364" y="112" width="180" height="38" rx="7" fill="#ffffff" stroke="#94a3b8"/>
    <text x="454" y="130">메시징 게이트웨이</text>
    <text x="454" y="145" font-size="10" fill="#64748b">Telegram·Discord·Slack 등 20+</text>
    <rect x="564" y="112" width="130" height="38" rx="7" fill="#ffffff" stroke="#94a3b8"/>
    <text x="629" y="130">IDE 연동</text>
    <text x="629" y="145" font-size="10" fill="#64748b">VS Code·Zed (ACP)</text>
    <rect x="714" y="112" width="122" height="38" rx="7" fill="#ffffff" stroke="#94a3b8"/>
    <text x="775" y="130">API 서버</text>
    <text x="775" y="145" font-size="10" fill="#64748b">OpenAI 호환</text>
  </g>
  <line x1="440" y1="164" x2="440" y2="196" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- core -->
  <rect x="260" y="200" width="360" height="78" rx="10" fill="#0d9488" fill-opacity="0.08" stroke="#0d9488" stroke-width="1.6"/>
  <text x="440" y="230" font-size="15" font-weight="700" fill="#115e59" text-anchor="middle">AIAgent 코어 (run_agent.py)</text>
  <text x="440" y="250" font-size="11.5" fill="#334155" text-anchor="middle">컨텍스트 조립 · 에이전트 루프 · 툴 호출 중재 · 컨텍스트 압축</text>
  <text x="440" y="266" font-size="11.5" fill="#334155" text-anchor="middle">CLI든 메신저든 크론이든 전부 이 단일 코어를 거친다</text>

  <!-- left: providers -->
  <line x1="260" y1="239" x2="196" y2="239" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="196" y1="239" x2="260" y2="239" stroke="#475569" stroke-width="0" />
  <rect x="24" y="196" width="172" height="180" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="110" y="220" font-size="12.5" font-weight="700" fill="#334155" text-anchor="middle">LLM 프로바이더</text>
  <text x="110" y="236" font-size="10.5" fill="#64748b" text-anchor="middle">두뇌 — 교체 가능</text>
  <g font-size="11.5" fill="#0f172a" text-anchor="middle">
    <rect x="38" y="246" width="144" height="26" rx="6" fill="#ffffff" stroke="#94a3b8"/><text x="110" y="263">로컬 Ollama / vLLM</text>
    <rect x="38" y="278" width="144" height="26" rx="6" fill="#ffffff" stroke="#94a3b8"/><text x="110" y="295">Anthropic / OpenAI</text>
    <rect x="38" y="310" width="144" height="26" rx="6" fill="#ffffff" stroke="#94a3b8"/><text x="110" y="327">OpenRouter 등 20+</text>
  </g>
  <text x="110" y="360" font-size="10.5" fill="#64748b" text-anchor="middle">트랜스포트 계층이 포맷 변환</text>

  <!-- right: tools -->
  <line x1="620" y1="239" x2="684" y2="239" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>
  <rect x="684" y="196" width="172" height="180" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="770" y="220" font-size="12.5" font-weight="700" fill="#334155" text-anchor="middle">툴 (약 30종)</text>
  <text x="770" y="236" font-size="10.5" fill="#64748b" text-anchor="middle">손발 — 실제 행동</text>
  <g font-size="11.5" fill="#0f172a" text-anchor="middle">
    <rect x="698" y="246" width="144" height="26" rx="6" fill="#ffffff" stroke="#94a3b8"/><text x="770" y="263">terminal · file · code</text>
    <rect x="698" y="278" width="144" height="26" rx="6" fill="#ffffff" stroke="#94a3b8"/><text x="770" y="295">web_search · browser</text>
    <rect x="698" y="310" width="144" height="26" rx="6" fill="#ffffff" stroke="#94a3b8"/><text x="770" y="327">vision · TTS · cron …</text>
  </g>
  <text x="770" y="360" font-size="10.5" fill="#64748b" text-anchor="middle">셸은 터미널 백엔드에서 실행</text>

  <!-- terminal backend note under tools -->
  <rect x="684" y="392" width="172" height="52" rx="10" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="770" y="413" font-size="11.5" font-weight="700" fill="#92400e" text-anchor="middle">터미널 백엔드 6종</text>
  <text x="770" y="430" font-size="10.5" fill="#92400e" text-anchor="middle">local · Docker · SSH · Modal 등</text>
  <line x1="770" y1="376" x2="770" y2="392" stroke="#475569" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- bottom: persistence -->
  <line x1="440" y1="278" x2="440" y2="462" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>
  <rect x="130" y="466" width="620" height="96" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="146" y="490" font-size="12" font-weight="700" fill="#64748b">영속 계층 (세션이 끝나도 남는 것 — Hermes의 차별점)</text>
  <g font-size="12" fill="#0f172a" text-anchor="middle">
    <rect x="150" y="502" width="136" height="44" rx="7" fill="#ffffff" stroke="#94a3b8"/>
    <text x="218" y="521">세션 기록</text><text x="218" y="537" font-size="10" fill="#64748b">FTS5 전문 검색</text>
    <rect x="302" y="502" width="136" height="44" rx="7" fill="#ffffff" stroke="#94a3b8"/>
    <text x="370" y="521">스킬</text><text x="370" y="537" font-size="10" fill="#64748b">경험→절차 문서 자가생성</text>
    <rect x="454" y="502" width="136" height="44" rx="7" fill="#ffffff" stroke="#94a3b8"/>
    <text x="522" y="521">메모리</text><text x="522" y="537" font-size="10" fill="#64748b">사용자·환경 지식 축적</text>
    <rect x="606" y="502" width="128" height="44" rx="7" fill="#ffffff" stroke="#94a3b8"/>
    <text x="670" y="521">설정</text><text x="670" y="537" font-size="10" fill="#64748b">config.yaml · .env</text>
  </g>
  <text x="24" y="586" font-size="10.5" fill="#94a3b8">출처: hermes-agent.nousresearch.com/docs (Features Overview · Configuration) 재구성</text>
</svg>
