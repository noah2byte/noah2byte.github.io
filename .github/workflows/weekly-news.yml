name: Weekly News Digest

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Packages
        run: |
          pip install \
            feedparser \
            requests \
            beautifulsoup4 \
            lxml \
            pyyaml \
            python-dateutil

      - name: Generate GeekNews
        run: python scripts/geeknews.py

      # - name: Generate YozmIT
      #   run: python scripts/yozmit.py

      - name: Generate YAML
        run: python scripts/update_weekly_yaml.py

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .

          git commit -m "weekly digest update" || true

          git pull origin main --rebase
          git push origin main
